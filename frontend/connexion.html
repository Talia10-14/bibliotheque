<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="formulaire.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Connexion</title>
</head>
<header>
</header>
<body>
    <main>
        <div class="d1">
            <form method="get" action="#" name="monFormulaire" autocomplete="on" enctype="" id="formConnexion">
                <h1>CONNEXION</h1>
                <div class="inp">
                <input id="email" name="email" type="email" placeholder="Email" required>
                </div>
                <div class="inp password-container">
                    <input name="MotDePasse" type="password" id="motdepasse" placeholder="Mot de passe" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('motdepasse', event)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div>
                    <a href="#">Mot de passe oublié?</a>
                </div>
                <button type="submit">Connexion</button>
            </form>
        </div>
    </main>
</body>
<footer>

</footer>
<script>
    function togglePasswordVisibility(fieldId, event) {
        if (event) event.preventDefault();
        
        const input = document.getElementById(fieldId);
        const button = event ? event.target.closest('.toggle-password') : document.querySelector('.toggle-password');
        const icon = button ? button.querySelector('i') : null;
        
        if (!input || !button || !icon) return;
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
        }
    }

    document.getElementById('formConnexion').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const motdepasse = document.getElementById('motdepasse').value;

  const url = '/api/auth/connexion'.trim();

const res = await fetch(url, {

    method: 'POST',
    headers: {'Content-Type': 'application/json' },
    body: JSON.stringify({ email, motdepasse })
  });

  const data = await res.json();
  alert(data.message);

  if (res.ok) {
    // Stocker le token reçu dans le localStorage pour les futures requêtes
    localStorage.setItem('token', data.token);

    const decoded = jwt_decode(data.token);
    const role = decoded.role;
    localStorage.setItem('role', role);

    // Redirection selon rôle
    if (role === 'admin') {
      window.location.href = 'tbadmin.html';
    } else if (role === 'biblio') {
      window.location.href = 'tbbiblio.html';
    } else {
      window.location.href = 'tbperso.html';
    }
  } else {
    alert(data.message);
  }
});

</script>
<script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>

</html>
